<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelen Wiki – Proyectos Dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#EDEAE3;--bg2:#F7F4EE;--bg3:#FFFFFF;--border:#DDD9D0;
  --text:#1C1917;--text-muted:#8A8178;--accent:#C84B0A;
  --tag-bg:#FDE8DB;--tag-text:#C84B0A;--link:#C84B0A;
  --sidebar-w:240px;--graph-w:280px;
  --rainbow:linear-gradient(90deg,#818CF8,#A78BFA,#EC4899,#F97316,#FBBF24);
}
html{scroll-behavior:smooth}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.rainbow-bar{height:4px;background:var(--rainbow);position:fixed;top:0;left:0;right:0;z-index:200}
.topbar{height:52px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.4rem;gap:1rem;position:fixed;top:4px;left:0;right:0;z-index:100;}
.topbar-logo{font-family:"Fraunces",serif;font-size:1.05rem;color:var(--text);font-weight:700;}
.topbar-logo span{color:var(--text-muted);font-style:italic;font-weight:400}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:"DM Sans",sans-serif;font-size:0.82rem;padding:0.4rem 0.8rem 0.4rem 2rem;border-radius:20px;outline:none;transition:border-color 0.2s;}
.search-wrap input::placeholder{color:var(--text-muted)}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.8rem}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:0.6rem}
.btn-graph{display:flex;align-items:center;gap:0.4rem;padding:0.35rem 0.9rem;background:var(--bg);border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-size:0.75rem;cursor:pointer;transition:all 0.2s;font-family:"DM Sans",sans-serif;font-weight:500;}
.btn-graph:hover,.btn-graph.active{border-color:var(--accent);color:var(--accent);background:var(--tag-bg)}
.note-count{font-size:0.72rem;color:var(--text-muted);font-family:"JetBrains Mono",monospace}
.layout{display:flex;margin-top:56px;height:calc(100vh - 56px);overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:1.2rem 0;}
.sidebar-label{font-size:0.62rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.6rem;padding:0 1rem;}
.note-item{display:flex;align-items:center;gap:0.45rem;padding:0.45rem 0.9rem;cursor:pointer;transition:all 0.15s;font-size:0.8rem;color:var(--text-muted);margin:1px 0.5rem;border-radius:8px;}
.note-item:hover{background:var(--bg3);color:var(--text)}
.note-item.active{background:var(--tag-bg);color:var(--accent);font-weight:500}
.note-dot{width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0}
.note-item.active .note-dot{background:var(--accent)}
.note-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main{flex:1;overflow-y:auto;padding:2.5rem 3.5rem;background:var(--bg)}
.graph-panel{width:0;min-width:0;overflow:hidden;background:var(--bg2);border-left:1px solid var(--border);transition:width 0.3s ease,min-width 0.3s ease;display:flex;flex-direction:column;}
.graph-panel.open{width:var(--graph-w);min-width:var(--graph-w)}
.graph-header{padding:1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.graph-title{font-size:0.62rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted)}
.graph-svg-wrap{flex:1;overflow:hidden}
#graphSvg{width:100%;height:100%}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;gap:0.8rem;}
.empty-logo{font-family:"Fraunces",serif;font-size:3rem;background:var(--rainbow);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.5rem;}
.empty-state h2{font-family:"Fraunces",serif;font-size:1.4rem;color:var(--text-muted);font-weight:400}
.empty-state p{font-size:0.82rem;color:var(--text-muted);max-width:260px;line-height:1.6}
.note-header{margin-bottom:2rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border)}
.note-title{font-family:"Fraunces",serif;font-size:2.2rem;color:var(--text);line-height:1.2;margin-bottom:0.6rem;font-weight:700}
.note-meta{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}
.note-tag{font-size:0.7rem;background:var(--tag-bg);color:var(--tag-text);padding:0.2rem 0.6rem;border-radius:20px;font-weight:500;}
.note-tag.gray{background:var(--bg3);color:var(--text-muted);border:1px solid var(--border)}
.md-content{line-height:1.8;color:var(--text);max-width:680px}
.md-content h1{display:none}
.md-content h2{font-family:"Fraunces",serif;font-weight:600;font-size:1.1rem;color:var(--text);margin:2rem 0 0.6rem;}
.md-content h3{font-size:0.7rem;font-weight:600;margin:1.5rem 0 0.4rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;}
.md-content p{margin-bottom:0.9rem;font-size:0.9rem;color:#3D3530}
.md-content ul,.md-content ol{margin:0.4rem 0 0.9rem 1.2rem;font-size:0.9rem}
.md-content li{margin-bottom:0.3rem;color:#3D3530}
.md-content code{font-family:"JetBrains Mono",monospace;font-size:0.78rem;background:var(--bg);color:var(--accent);padding:0.1rem 0.4rem;border-radius:4px;border:1px solid var(--border);}
.md-content a,.wikilink{color:var(--link);text-decoration:none;border-bottom:1px solid rgba(200,75,10,0.3);cursor:pointer;transition:border-color 0.2s;}
.md-content a:hover,.wikilink:hover{border-bottom-color:var(--accent)}
.md-content strong{color:var(--text);font-weight:600}
.md-content hr{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
.md-content img{max-width:100%;border-radius:12px;margin:1rem 0;border:1px solid var(--border);}
.search-results{padding:0.5rem 0}
.sr-item{padding:1rem;border-radius:12px;border:1px solid var(--border);background:var(--bg3);margin-bottom:0.6rem;cursor:pointer;transition:all 0.15s;}
.sr-item:hover{border-color:var(--accent);background:var(--tag-bg)}
.sr-title{font-family:"Fraunces",serif;font-size:1rem;color:var(--text);margin-bottom:0.3rem;font-weight:600}
.sr-preview{font-size:0.78rem;color:var(--text-muted);line-height:1.5}
.no-results{text-align:center;padding:2rem;color:var(--text-muted);font-size:0.85rem}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.note-wrap{animation:fadeIn 0.25s ease both}
.graph-tooltip{position:fixed;background:var(--bg3);border:1px solid var(--accent);color:var(--text);font-size:0.72rem;padding:0.3rem 0.6rem;border-radius:6px;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:200;font-family:"JetBrains Mono",monospace;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
</style>
</head>
<body>
<div class="rainbow-bar"></div>
<div class="topbar">
  <div class="topbar-logo">Pelen <span>Wiki</span></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Buscar proyectos..." oninput="handleSearch(this.value)">
  </div>
  <div class="topbar-actions">
    <span class="note-count" id="noteCount"></span>
    <button class="btn-graph" id="graphBtn" onclick="toggleGraph()">◎ Grafo</button>
  </div>
</div>
<div class="layout">
  <aside class="sidebar">
    <div style="padding:0 0.5rem">
      <div class="sidebar-label">Proyectos Dev</div>
      <div id="noteList"></div>
    </div>
  </aside>
  <main class="main" id="mainContent">
    <div class="empty-state">
      <div class="empty-logo">✦</div>
      <h2>Selecciona un proyecto</h2>
      <p>Elige una nota del sidebar o activa el grafo para ver las conexiones.</p>
    </div>
  </main>
  <div class="graph-panel" id="graphPanel">
    <div class="graph-header"><div class="graph-title">Graph view</div></div>
    <div class="graph-svg-wrap" id="graphWrap"><svg id="graphSvg"></svg></div>
  </div>
</div>
<div class="graph-tooltip" id="tooltip"></div>
<script>
// Base path: funciona tanto en localhost como en GitHub Pages
const BASE = location.pathname.replace(/\/[^/]*$/, "");

const NOTES=[
  {id:"rico-pan",    name:"Rico Pan",          file:"Proyectos Dev/Rico Pan.md",               status:"✅"},
  {id:"fitdiario",   name:"FitDiario",          file:"Proyectos Dev/FitDiario.md",              status:"🚧"},
  {id:"nimbus-radio",name:"Nimbus Radio",       file:"Proyectos Dev/Nimbus Radio.md",           status:"✅"},
  {id:"nimbus-wx",   name:"Nimbus Weather",     file:"Proyectos Dev/Nimbus Weather.md",         status:"✅"},
  {id:"ats-portal",  name:"ATS Staff Portal",   file:"Proyectos Dev/ATS Staff Portal.md",       status:"✅"},
  {id:"apcsp",       name:"AP CSP Exam Gen",    file:"Proyectos Dev/AP CSP Exam Gen.md",        status:"✅"},
  {id:"cr26",        name:"CR26 – Costa Rica",  file:"Proyectos Dev/CR26 (viaje Costa Rica).md",status:"✅"},
  {id:"pelen13",     name:"pelen13",            file:"Proyectos Dev/pelen13.md",                status:"✅"},
];
const LINKS=[
  {source:"nimbus-radio",target:"nimbus-wx"},
  {source:"nimbus-wx",   target:"nimbus-radio"},
  {source:"nimbus-radio",target:"pelen13"},
  {source:"nimbus-wx",   target:"pelen13"},
  {source:"fitdiario",   target:"pelen13"},
  {source:"cr26",        target:"ats-portal"},
  {source:"apcsp",       target:"ats-portal"},
];
const cache={},allContent={};
let currentNote=null,graphOpen=false,simulation=null;

function renderSidebar(notes=NOTES){
  document.getElementById("noteList").innerHTML=notes.map(n=>`
    <div class="note-item ${currentNote===n.id?'active':''}" onclick="loadNote('${n.id}')">
      <span class="note-dot"></span>
      <span class="note-name">${n.name}</span>
      <span>${n.status}</span>
    </div>`).join("");
  document.getElementById("noteCount").textContent=`${NOTES.length} notas`;
}

async function loadNote(id){
  const note=NOTES.find(n=>n.id===id);if(!note)return;
  currentNote=id;renderSidebar();
  document.getElementById("searchInput").value="";
  document.getElementById("mainContent").innerHTML=`<div style="color:var(--text-muted);padding:1rem;font-size:0.85rem">Cargando...</div>`;
  let md=cache[id];
  if(!md){
    try{const r=await fetch(BASE+"/"+note.file);if(!r.ok)throw 0;md=await r.text();}
    catch{md=getDemoContent(note);}
    cache[id]=md;allContent[id]=md;
  }
  renderNote(note,md);
  if(graphOpen)highlightNode(id);
}

function renderNote(note,md){
  const p=md.replace(/\[\[([^\]]+)\]\]/g,(_,name)=>{
    const t=NOTES.find(n=>n.name.toLowerCase()===name.toLowerCase());
    return t?`<a class="wikilink" onclick="loadNote('${t.id}')">${name}</a>`:`<span class="wikilink" style="opacity:0.4">${name}</span>`;
  });
  document.getElementById("mainContent").innerHTML=`
    <div class="note-wrap">
      <div class="note-header">
        <div class="note-title">${note.name}</div>
        <div class="note-meta">
          <span class="note-tag">Proyectos Dev</span>
          <span class="note-tag gray">${note.status} ${note.status==='✅'?'Terminado':'En desarrollo'}</span>
        </div>
      </div>
      <div class="md-content">${marked.parse(p)}</div>
    </div>`;
}

function getDemoContent(note){
  return `# ${note.name}\n\n## ¿Qué es?\nDescripción del proyecto.\n\n## Stack\n- HTML / CSS / JS\n\n## Estado actual\n${note.status}\n\n## Pendientes\n- (agregar)`;
}

function handleSearch(q){
  if(!q.trim()){renderSidebar();showEmpty();return;}
  const m=NOTES.filter(n=>n.name.toLowerCase().includes(q.toLowerCase())||(allContent[n.id]||"").toLowerCase().includes(q.toLowerCase()));
  renderSidebar(m);
  if(!m.length){document.getElementById("mainContent").innerHTML=`<div class="no-results">Sin resultados para "<strong>${q}</strong>"</div>`;return;}
  document.getElementById("mainContent").innerHTML=`
    <div class="search-results">
      <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:1rem">${m.length} resultado(s)</div>
      ${m.map(n=>`<div class="sr-item" onclick="loadNote('${n.id}')"><div class="sr-title">${n.status} ${n.name}</div><div class="sr-preview">${getPreview(n.id,q.toLowerCase())}</div></div>`).join("")}
    </div>`;
}

function getPreview(id,q){
  const c=allContent[id]||"";const i=c.toLowerCase().indexOf(q);
  if(i===-1)return"Clic para ver la nota";
  return"..."+c.slice(Math.max(0,i-50),Math.min(c.length,i+80)).replace(/[#*`\[\]]/g,"")+"...";
}

function showEmpty(){
  document.getElementById("mainContent").innerHTML=`<div class="empty-state"><div class="empty-logo">✦</div><h2>Selecciona un proyecto</h2><p>Elige una nota del sidebar o activa el grafo.</p></div>`;
}

function toggleGraph(){
  graphOpen=!graphOpen;
  document.getElementById("graphPanel").classList.toggle("open",graphOpen);
  document.getElementById("graphBtn").classList.toggle("active",graphOpen);
  if(graphOpen)setTimeout(()=>buildGraph(),500);
}

function buildGraph(){
  const wrap=document.getElementById("graphWrap");
  const W=Math.max(wrap.offsetWidth||wrap.clientWidth||240,240);
  const H=Math.max(wrap.offsetHeight||wrap.clientHeight||400,400);
  const svgEl=document.getElementById("graphSvg");
  svgEl.setAttribute("width",W);
  svgEl.setAttribute("height",H);
  d3.select("#graphSvg").selectAll("*").remove();
  const svg=d3.select("#graphSvg").attr("viewBox",`0 0 ${W} ${H}`);
  const nodes=NOTES.map(n=>({...n}));
  const links=LINKS.map(l=>({...l}));
  if(simulation)simulation.stop();
  simulation=d3.forceSimulation(nodes)
    .force("link",d3.forceLink(links).id(d=>d.id).distance(65))
    .force("charge",d3.forceManyBody().strength(-110))
    .force("center",d3.forceCenter(W/2,H/2))
    .force("collision",d3.forceCollide(26));
  const link=svg.append("g").selectAll("line").data(links).join("line")
    .attr("stroke","#DDD9D0").attr("stroke-width",1.5);
  const node=svg.append("g").selectAll("g").data(nodes).join("g")
    .attr("cursor","pointer")
    .call(d3.drag()
      .on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}))
    .on("click",(_,d)=>loadNote(d.id))
    .on("mouseover",(e,d)=>{
      const t=document.getElementById("tooltip");
      t.textContent=d.status+" "+d.name;t.style.opacity="1";
      t.style.left=(e.clientX+10)+"px";t.style.top=(e.clientY-10)+"px";
    })
    .on("mouseout",()=>{document.getElementById("tooltip").style.opacity="0";});
  node.append("circle")
    .attr("r",10)
    .attr("fill",d=>d.status==="🚧"?"#FDE8DB":"#FFFFFF")
    .attr("stroke",d=>d.status==="🚧"?"#C84B0A":"#DDD9D0")
    .attr("stroke-width",1.5);
  node.append("text").attr("text-anchor","middle").attr("dy","0.35em")
    .attr("font-size","9px").attr("pointer-events","none").text(d=>d.status);
  node.append("text").attr("text-anchor","middle").attr("dy","22px")
    .attr("font-size","7.5px").attr("fill","#8A8178").attr("pointer-events","none")
    .text(d=>d.name.length>12?d.name.slice(0,11)+"…":d.name);
  simulation.on("tick",()=>{
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    node.attr("transform",d=>`translate(${Math.max(14,Math.min(W-14,d.x))},${Math.max(14,Math.min(H-24,d.y))})`);
  });
}

function highlightNode(id){
  d3.select("#graphSvg").selectAll("circle")
    .attr("stroke-width",d=>d&&d.id===id?3:1.5)
    .attr("stroke",d=>d&&d.id===id?"#C84B0A":(d&&d.status==="🚧"?"#C84B0A":"#DDD9D0"));
}

renderSidebar();
</script>
</body>
</html>
